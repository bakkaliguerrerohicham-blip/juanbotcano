services:
  - type: web
    name: horus-ia
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./horus-core/Dockerfile
    dockerContext: ./horus-core
    envVars:
      - key: PORT
        value: 8080
      - key: APP_ENV
        value: production
      - key: OPENROUTER_REFERER
        value: https://impactodigital.es
      # Credenciales — añade los valores en el dashboard de Render
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false

  - type: web
    name: pastor-juan-cano
    env: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./pastor-juan-cano/Dockerfile
    dockerContext: ./pastor-juan-cano
    envVars:
      - key: PORT
        value: 5050
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: DEMO_TOKEN
        sync: false
